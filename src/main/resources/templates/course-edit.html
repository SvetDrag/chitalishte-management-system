<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирай Школа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-warning">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0 fw-bold">Редактиране на школа</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/courses/edit/{id}(id=${courseId})}" th:method="POST" th:object="${courseEditDTO}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Име на школата</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Тип на обучението</label>
                            <select th:field="*{type}" class="form-select" th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                                <option th:each="t : ${courseTypes}" th:value="${t}" th:text="${t.name() == 'GROUP' ? 'Групово занятие' : 'Индивидуален урок'}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{type}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Преподавател / Водител</label>
                            <select th:field="*{instructorId}" class="form-select" th:classappend="${#fields.hasErrors('instructorId')} ? 'is-invalid'">
                                <option value="" disabled selected>Изберете служител...</option>
                                <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.firstName + ' ' + emp.lastName}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{instructorId}"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Цена за едно посещение (лв.)</label>
                            <input type="number" step="0.01" th:field="*{pricePerLesson}" class="form-control" th:classappend="${#fields.hasErrors('pricePerLesson')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{pricePerLesson}"></div>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold fs-5">Запази промените</button>
                    </form>
                    <div class="text-center mt-3"><a href="/courses">Отказ</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
