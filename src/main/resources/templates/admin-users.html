<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ - Потребители</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/home">Бялата лястовица</a>
        <div class="d-flex align-items-center">
            <a href="/home" class="btn btn-outline-light btn-sm me-2">Назад към таблото</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4 text-primary fw-bold">Управление на потребители</h2>

    <div class="table-responsive bg-white rounded shadow-sm p-3">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Потребителско име</th>
                <th>Име и Фамилия</th>
                <th>Роля</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${allUsers}">
                <td class="fw-bold" th:text="${u.username}"></td>

                <td th:text="${u.firstName + ' ' + u.lastName}"></td>

                <td>
                        <span class="badge rounded-pill"
                              th:classappend="${u.role.name() == 'ADMIN' ? 'bg-danger' : 'bg-success'}"
                              th:text="${u.role.name()}">
                        </span>
                </td>
                <td>
                    <form th:action="@{/users/admin/delete/{id}(id=${u.id})}" th:method="POST"
                          th:if="${u.role.name() != 'ADMIN'}" class="d-inline">
                        <button class="btn btn-danger btn-sm fw-bold" onclick="return confirm('Сигурни ли сте, че искате да изтриете този потребител?')">Изтрий</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
