<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2 class="text-center mb-4">Вход в системата</h2>

            <div th:if="${badCredentials}" class="alert alert-danger text-center">
                Грешно потребителско име или парола!
            </div>

            <form th:action="@{/users/login}" th:method="POST" th:object="${userLoginDTO}" class="card p-4 shadow-sm">
                <div class="mb-3">
                    <label for="username" class="form-label">Потребителско име</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{username}">Грешка</div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Парола</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{password}">Грешка</div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Влез</button>
                <div class="text-center mt-3">
                    <a href="/">Назад към началото</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
