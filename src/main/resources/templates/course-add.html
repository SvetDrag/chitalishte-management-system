<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добави Школа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Регистриране на нова школа</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/courses/add}" th:method="POST" th:object="${courseAddDTO}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Име на школата</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="напр. Школа по гайда или Програмиране с Java">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Тип на обучението</label>
                            <select th:field="*{type}" class="form-select" th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                                <option value="" disabled selected>Изберете формат...</option>
                                <option th:each="t : ${courseTypes}" th:value="${t}" th:text="${t.name() == 'GROUP' ? 'Групово занятие' : 'Индивидуален урок'}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{type}"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Цена за едно посещение (лв.)</label>
                            <input type="number" step="0.01" th:field="*{pricePerLesson}" class="form-control" th:classappend="${#fields.hasErrors('pricePerLesson')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{pricePerLesson}"></div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fs-5">Създай школа</button>
                    </form>
                    <div class="text-center mt-3"><a href="/courses">Назад</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
