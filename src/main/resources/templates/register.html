<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Регистрация</h2>

            <form th:action="@{/users/register}" th:method="POST" th:object="${userRegisterDTO}" class="card p-4 shadow-sm">

                <div class="mb-3">
                    <label for="username" class="form-label">Потребителско име</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{username}">Грешка</div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="firstName" class="form-label">Име</label>
                        <input type="text" id="firstName" th:field="*{firstName}" class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{firstName}">Грешка</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="lastName" class="form-label">Фамилия</label>
                        <input type="text" id="lastName" th:field="*{lastName}" class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{lastName}">Грешка</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Имейл адрес</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}">Грешка</div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label">Парола</label>
                        <input type="password" id="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{password}">Грешка</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="confirmPassword" class="form-label">Потвърди парола</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{confirmPassword}">Грешка</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 mt-2">Регистрирай се</button>
                <div class="text-center mt-3">
                    <a href="/users/login">Вече имате акаунт? Влезте тук.</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
