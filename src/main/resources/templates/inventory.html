<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Инвентар - НЧ Бялата лястовица</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/home">Бялата лястовица</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/events">Събития</a></li>
                <li class="nav-item"><a class="nav-link" href="/courses">Школи</a></li>
                <li class="nav-item"><a class="nav-link active fw-bold" href="/inventory">Инвентар</a></li>
            </ul>
        </div>
        <div class="d-flex align-items-center" th:if="${session.user_id != null}">
            <span class="text-white me-3">Здравей, <b th:text="${session.first_name}"></b>!</span>
            <a href="/users/logout" class="btn btn-danger btn-sm">Изход</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Складов инвентар</h2>
        <a th:if="${session.user_role == 'ADMIN'}" href="/inventory/add" class="btn btn-success fw-bold shadow-sm">
            + Добави предмет
        </a>
    </div>

    <div class="table-responsive bg-white rounded shadow-sm p-3">
        <table class="table table-hover align-middle">
            <thead class="table-primary">
            <tr>
                <th>Наименование</th>
                <th>Състояние</th>
                <th>Статус</th>
                <th>Зает от</th>
                <th th:if="${session.user_role == 'ADMIN'}">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${allItems}">
                <td class="fw-bold" th:text="${item.name}">Гайда</td>
                <td th:text="${item.itemCondition}">Много добро</td>
                <td>
                        <span class="badge rounded-pill"
                              th:classappend="${item.status.name() == 'AVAILABLE' ? 'bg-success' : (item.status.name() == 'BORROWED' ? 'bg-secondary' : 'bg-danger')}"
                              th:text="${item.status.name() == 'AVAILABLE' ? 'Наличен' : (item.status.name() == 'BORROWED' ? 'Зает' : 'В ремонт')}">
                        </span>
                </td>
                <td th:text="${item.borrowedBy != null ? item.borrowedBy.fullName : '-'}">-</td>
                <td th:if="${session.user_role == 'ADMIN'}">
                    <a th:href="@{/inventory/edit/{id}(id=${item.id})}" class="btn btn-warning btn-sm fw-bold">Редактирай</a>
                    <form th:action="@{/inventory/delete/{id}(id=${item.id})}" th:method="POST" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm fw-bold" onclick="return confirm('Изтриване на този запис?')">Изтрий</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${allItems.isEmpty()}">
                <td colspan="5" class="text-center text-muted">Инвентарът е празен.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
