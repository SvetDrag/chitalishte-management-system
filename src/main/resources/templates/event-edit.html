<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редакция на събитие</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/home">Бялата лястовица</a>
        <div class="d-flex align-items-center">
            <a href="/events" class="btn btn-outline-light btn-sm me-2">Назад към събитията</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-warning">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0 fw-bold">Редактиране на събитие</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/events/edit/{id}(id=${eventId})}" th:method="POST" th:object="${eventEditDTO}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Заглавие</label>
                            <input type="text" th:field="*{title}" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{title}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Дата и час</label>
                                <input type="datetime-local" th:field="*{eventDate}" class="form-control" th:classappend="${#fields.hasErrors('eventDate')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{eventDate}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Локация</label>
                                <input type="text" th:field="*{location}" class="form-control" th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{location}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Описание</label>
                            <textarea th:field="*{description}" class="form-control" rows="5" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback" th:errors="*{description}"></div>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 fw-bold fs-5">Запази промените</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
