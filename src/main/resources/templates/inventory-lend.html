<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Отдаване на инвентар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-info">
                <div class="card-header bg-info text-white fw-bold">
                    Предаване на инвентар: <span th:text="${itemToLend.name}"></span>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/inventory/lend/{id}(id=${itemId})}" th:method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Изберете потребител (Получател)</label>
                            <select name="userId" class="form-select" required>
                                <option value="" disabled selected>Изберете на кого давате предмета...</option>
                                <option th:each="u : ${allUsers}" th:value="${u.id}" th:text="${u.firstName + ' ' + u.lastName}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-info text-white w-100 fw-bold">Отдай предмета</button>
                    </form>
                    <div class="text-center mt-3"><a href="/inventory" class="text-secondary">Отказ</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
